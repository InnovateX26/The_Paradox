    <style>
        :root {
            --dark: #1e2511;

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            background: var(--glass);

            border: var(--glass-border);

            background: rgba(35, 43, 20, 0.4);
            backdrop-filter: blur(20px);

        /* Premium Motion Animations */
        @keyframes message-slide-in-right {
            from { opacity: 0; transform: translateX(20px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes message-slide-in-left {
            from { opacity: 0; transform: translateX(-20px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes progress-load {
            0% { width: 0%; }
            50% { width: 70%; }

        @keyframes ping-premium {
            0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.4); opacity: 0; box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); opacity: 0; }
        }

        .animate-message-right { animation: message-slide-in-right 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        .animate-message-left { animation: message-slide-in-left 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        
        .progress-bar {
            position: fixed;

        .ping-ring {

        .nav-card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

        .nav-card-hover:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .btn-hover-scale {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-hover-scale:hover {
            transform: scale(1.05);
        }
        .btn-hover-scale:active {
            transform: scale(0.95);
        }

        .slide-content {
            animation: message-slide-in-right 0.6s ease-out;
        }
    </style>

</body><script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, orderBy, getDocs, addDoc, updateDoc, serverTimestamp, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { initAuthGuard, handleSignOut } from "./js/auth-guard.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBrep0S6P0oAzMQ-bE8h7GHTi5wn_QNrVg",
    authDomain: "stemvi-afbac.firebaseapp.com",
    projectId: "stemvi-afbac",
    storageBucket: "stemvi-afbac.firebasestorage.app",
    messagingSenderId: "548343962225",
    appId: "1:548343962225:web:5e5624839645924b1e19d0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentSessionId = null;

  initAuthGuard(auth);
  
  const logoutBtns = ['sign-out-btn', 'sidebar-logout-btn'];
  logoutBtns.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.addEventListener('click', () => handleSignOut(auth));
  });

  window.initPage = async (user) => {
    currentUser = user;
    loadSessions(user.uid);
    
    document.getElementById('user-email-display').textContent = user.email;
    
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
      const userData = userDoc.data();
      document.getElementById('user-name-display').textContent = userData.name || 'User';
      document.getElementById('user-avatar-initial').textContent = (userData.name || 'U').charAt(0).toUpperCase();
    }
  };

  async function loadSessions(uid) {
    const q = query(collection(db, `chatSessions/${uid}/sessions`), orderBy("updatedAt", "desc"), limit(10));
    const querySnapshot = await getDocs(q);
    const container = document.getElementById('sessions-container');
    container.innerHTML = '';
    
    if (querySnapshot.empty) {
      container.innerHTML = '<p class="text-on-surface-variant text-[10px] p-4 uppercase font-black tracking-widest opacity-40 text-center">No history yet</p>';
      return;
    }

    querySnapshot.forEach(doc => {
      const data = doc.data();
      const div = document.createElement('div');
      const isActive = doc.id === currentSessionId;
      div.className = `p-4 ${isActive ? 'bg-primary text-dark' : 'text-on-surface-variant hover:bg-white/5'} rounded-xl flex items-start gap-4 transition-all duration-300 cursor-pointer group`;
      div.innerHTML = `
        <span class="material-symbols-outlined text-sm ${isActive ? 'text-dark' : 'text-primary'}">${data.type === 'room' ? 'groups' : 'history'}</span>
        <div class="overflow-hidden">
          <p class="font-headline font-black text-xs uppercase tracking-tight truncate">${data.title || 'Untitled Session'}</p>
          <p class="text-[10px] ${isActive ? 'text-dark/60' : 'text-on-surface-variant/40'} font-bold mt-1">${timeAgo(data.updatedAt)}</p>
        </div>
      `;
      div.onclick = () => selectSession(doc.id);
      container.appendChild(div);
    });
  }

  async function selectSession(sessionId) {
    if (currentSessionId === sessionId) return;
    currentSessionId = sessionId;
    
    const chatContainer = document.getElementById('chat-container');
    chatContainer.innerHTML = '<div class="h-full flex items-center justify-center"><div class="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin"></div></div>';
    
    // Load messages via onSnapshot for real-time
    const q = query(collection(db, `chatSessions/${currentUser.uid}/sessions/${sessionId}/messages`), orderBy("timestamp", "asc"));
    
    onSnapshot(q, (snapshot) => {
      chatContainer.innerHTML = '';
      if (snapshot.empty) {
        chatContainer.innerHTML = '<p class="text-on-surface-variant text-sm italic text-center pt-20">No messages yet. Ask something!</p>';
      }
      snapshot.forEach(doc => {
        appendMessageUI(doc.data());
      });
      chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    });
    loadSessions(currentUser.uid);
  }

  function appendMessageUI(msg) {
    const container = document.getElementById('chat-container');
    const isUser = msg.role === 'user';
    const html = isUser ? `
      <div class="flex flex-col items-end gap-2 max-w-2xl ml-auto animate-message-right">
        <div class="bg-primary text-dark px-8 py-5 rounded-2xl rounded-tr-none shadow-xl font-medium">
          <p class="text-sm leading-relaxed">${msg.content}</p>
        </div>
        <span class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant/40 mr-2">${timeAgo(msg.timestamp)}</span>
      </div>
    ` : `
      <div class="flex flex-col items-start gap-5 max-w-3xl animate-message-left">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center border border-white/5">
            <span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
          </div>
          <span class="text-[10px] font-black uppercase tracking-widest text-primary">Lab Assistant</span>
        </div>
        <div class="bot-bubble-glass p-8 rounded-2xl rounded-tl-none prose prose-invert max-w-none">
          <p class="text-on-surface leading-relaxed text-sm">${msg.content}</p>
        </div>
      </div>
    `;
    container.insertAdjacentHTML('beforeend', html);
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const content = input.value.trim();
    if (!content || !currentUser) return;
    
    // UI: Add user message immediately
    appendMessageUI({ role: 'user', content, timestamp: new Date() });
    input.value = '';

    if (!currentSessionId) {
      const docRef = await addDoc(collection(db, `chatSessions/${currentUser.uid}/sessions`), {
        title: content.substring(0, 30),
        updatedAt: serverTimestamp(),
        type: 'doubt'
      });
      currentSessionId = docRef.id;
    }
    
    await addDoc(collection(db, `chatSessions/${currentUser.uid}/sessions/${currentSessionId}/messages`), {
      role: 'user',
      content,
      timestamp: serverTimestamp()
    });
    
    // Call our serverless backend
    await callChatAPI(content);
  }

  async function callChatAPI(userText) {
    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: userText })
      });
      
      const data = await response.json();
      if (data.error) throw new Error(data.error);

      const aiText = data.reply;
      
      await addDoc(collection(db, `chatSessions/${currentUser.uid}/sessions/${currentSessionId}/messages`), {
        role: 'assistant',
        content: aiText,
        timestamp: serverTimestamp()
      });

      // Update session title & timestamp
      await updateDoc(doc(db, `chatSessions/${currentUser.uid}/sessions`, currentSessionId), {
        updatedAt: serverTimestamp()
      });
    } catch (err) {
      console.error("AI Error:", err);
      appendMessageUI({ role: 'assistant', content: "Mafi chahta hoon, kuch error aaya hai. Dobara try karein.", timestamp: new Date() });
    }
  }

  document.getElementById('send-btn').onclick = sendMessage;
  document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
  document.getElementById('new-doubt-btn').onclick = () => {
    currentSessionId = null;
    document.getElementById('chat-container').innerHTML = `
      <div class="h-full flex flex-col items-center justify-center text-center space-y-6 opacity-60">
        <div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center">
          <span class="material-symbols-outlined text-primary text-5xl">psychology</span>
        </div>
        <div>
          <h2 class="text-2xl font-black font-headline text-on-surface">New Session</h2>
          <p class="text-on-surface-variant text-sm mt-2">Pooch lo! Lab is active. 🎯</p>
        </div>
      </div>
    `;
    loadSessions(currentUser.uid);
  };

  function timeAgo(ts) {
    if(!ts) return 'Just now';
    const date = ts.toDate ? ts.toDate() : new Date(ts);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

</script>
</body></html>
